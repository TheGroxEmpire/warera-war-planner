name: Deploy to Server
run-name: Deploy ${{ github.ref_name }} to production

on:
  push:
    branches:
      - master
      - main

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ vars.DEPLOY_URL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        env:
          GH_REF_NAME: ${{ github.ref_name }}
          GH_REPOSITORY: ${{ github.repository }}
          GH_SHA: ${{ github.sha }}
          GH_TOKEN: ${{ github.token }}
          GH_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          DEPLOY_ENABLE_TRAEFIK: ${{ secrets.DEPLOY_ENABLE_TRAEFIK }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          envs: GH_REF_NAME,GH_REPOSITORY,GH_SHA,GH_TOKEN,GH_RUN_URL,DEPLOY_ENABLE_TRAEFIK
          script_stop: true
          script: |
            set -Eeuo pipefail
            echo "Starting deployment..."
            cd "${{ secrets.DEPLOY_PATH }}"

            BRANCH="${GH_REF_NAME}"
            REPO_URL="https://x-access-token:${GH_TOKEN}@github.com/${GH_REPOSITORY}.git"

            echo "Pulling latest code from ${BRANCH}..."
            git fetch --depth=1 "${REPO_URL}" "${BRANCH}"
            git checkout -B "${BRANCH}" FETCH_HEAD
            git reset --hard FETCH_HEAD

            if ! grep -q 'warera-war-planner' docker-compose.traefik.yml || ! test -f warera/app.py; then
              echo "Error: expected WarEra War Planner deploy checkout."
              echo "DEPLOY_PATH may point at the wrong application directory."
              exit 1
            fi

            unset DATABASE_URL DB_URL GOOSE_DRIVER GOOSE_DBSTRING GOOSE_MIGRATION_DIR

            echo "Deployment at $(date) branch=${BRANCH} commit=${GH_SHA} run=${GH_RUN_URL}" >> deploy.log

            if ! sudo -n true 2>/dev/null; then
              echo "Error: passwordless sudo is not configured."
              exit 1
            fi

            export ENABLE_TRAEFIK="${DEPLOY_ENABLE_TRAEFIK:-1}"

            bash scripts/deploy.sh

            echo "Deployment completed successfully."

      - name: Deployment summary
        if: always()
        env:
          DEPLOY_URL: ${{ vars.DEPLOY_URL }}
          JOB_STATUS: ${{ job.status }}
        run: |
          {
            echo "## Deployment"
            echo
            echo "- Status: ${JOB_STATUS}"
            echo "- Environment: production"
            echo "- Branch: \`${{ github.ref_name }}\`"
            echo "- Commit: \`${{ github.sha }}\`"
            echo "- Workflow run: [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            if [ -n "${DEPLOY_URL}" ]; then
              echo "- Site: [${DEPLOY_URL}](${DEPLOY_URL})"
            else
              echo "- Site: not configured. Set repository variable \`DEPLOY_URL\`."
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
