<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warera Build Tool</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Saira:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    {% include 'skill_svgs.html' %}
    <div class="container">
        <h1>Warera Build Tool</h1>
        <div class="top-section">
            <form id="build-form">
                <div class="row-group">
                    <div class="slider-container small">
                        <div class="slider-label">
                            <label for="level">Level</label>
                            <input type="number" id="level-input" name="level" min="1" max="50" value="1" class="slider-input">
                        </div>
                        <input type="range" id="level-slider" name="level" min="1" max="50" value="1" class="slider">
                    </div>
                    <div class="slider-container small">
                        <div class="slider-label">
                            <label for="rank_bonus">Rank %</label>
                            <input type="number" id="rank_bonus-input" name="rank_bonus" min="0" max="37.5" value="0" step="0.25" class="slider-input">
                        </div>
                        <input type="range" id="rank_bonus-slider" name="rank_bonus" min="0" max="37.5" value="0" step="0.25" class="slider">
                    </div>
                </div>

                <div class="row-group">
                    <div class="input-group">
                        <label for="companies">Companies</label>
                        <select id="companies" name="companies">
                            {% for i in range(2, 13) %}
                            <option value="{{ i }}">{{ i }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="checkbox-wrapper">
                        <input type="checkbox" name="pill" id="pill">
                        <label for="pill">Pill</label>
                    </div>

                    <div class="checkbox-wrapper">
                        <input type="checkbox" name="max_damage_build" id="max-damage-build">
                        <label for="max-damage-build">Mythic Set</label>
                    </div>

                    <div class="pill-wrapper">
                        <label>Armor/Dodge</label>
                        <div class="pill-toggle" id="scaling-toggle">
                            <div class="pill-slider"></div>
                            <span class="pill-label on">Prod</span>
                            <span class="pill-label off">Dev</span>
                        </div>
                        <input type="hidden" name="scaling_mode" id="scaling-mode-input" value="dev">
                    </div>
                </div>
                <button type="submit" class="optimize-btn">Optimize</button>
            </form>
        </div>
        <div id="results" class="results-grid"></div>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
