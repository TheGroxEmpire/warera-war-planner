<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warera Build Helper</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Saira:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    {% include 'skill_svgs.html' %}
    <div class="container">
        <h1>Warera Build Helper</h1>
        <div class="top-section">
            <form id="build-form">
                <div class="slider-container">
                    <div class="slider-label">
                        <label for="level">Level</label>
                        <input type="number" id="level-input" name="level" min="1" max="50" value="1" class="slider-input">
                    </div>
                    <input type="range" id="level-slider" name="level" min="1" max="50" value="1" class="slider">
                </div>
                <div class="slider-container">
                    <div class="slider-label">
                        <label for="companies">Companies</label>
                        <input type="number" id="companies-input" name="companies" min="2" max="12" value="2" class="slider-input">
                    </div>
                    <input type="range" id="companies-slider" name="companies" min="2" max="12" value="2" class="slider">
                </div>
                <div class="slider-container">
                    <div class="slider-label">
                        <label for="rank_bonus">Rank Bonus %</label>
                        <input type="number" id="rank_bonus-input" name="rank_bonus" min="0" max="75" value="0" step="1" class="slider-input">
                        <span>%</span>
                    </div>
                    <input type="range" id="rank_bonus-slider" name="rank_bonus" min="0" max="75" value="0" step="1" class="slider">
                </div>
                <div class="toggle-buttons">
                    <button type="button" class="toggle-btn" data-name="pill">PILL</button>
                    <button type="button" class="toggle-btn" data-name="dodge">DODGE FOCUS</button>
                </div>
                <input type="hidden" name="pill" id="pill-input" value="off">
                <input type="hidden" name="dodge" id="dodge-input" value="off">
                <button type="submit" class="optimize-btn">Optimize</button>
            </form>
            <div class="trends" id="trends"></div>
        </div>
        <div id="results" class="results-grid"></div>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
